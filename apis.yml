aid: gvisor
name: gVisor
description: >-
  gVisor is an application kernel written in Go that implements a substantial
  portion of the Linux system surface. It provides an additional layer of
  isolation between running applications and the host operating system,
  intercepting and handling application system calls in user space to reduce the
  attack surface of the host kernel.
